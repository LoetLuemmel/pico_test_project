[env:pico]
platform = raspberrypi
board = pico
framework = baremetal

; Build options
build_flags = 
    -O2
    -Wall
    -Wextra

; Include paths
build_include_search_path = 
    ${PROJECT_DIR}/src
    ${PROJECT_DIR}/src/drivers
    ${PROJECT_DIR}/build/generated/pico_base

; Source files
src_filter = 
    +<main.c>
    +<src/drivers/>

; Upload settings
upload_protocol = cmsis-dap
upload_speed = 5000000

; Debugging
debug_tool = cmsis-dap
